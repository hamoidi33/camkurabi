<!DOCTYPE html>
<html lang="tr" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>⛧ KURIX HACKER ⛧</title>
    <style>
        :root {
            --bg: #050810;
            --bg2: #0a0e1c;
            --bg3: #0f1424;
            --bg4: #141a2e;
            --border: #1c2440;
            --green: #00e676;
            --green2: #00c853;
            --glow: #00ff41;
            --red: #ff1744;
            --red2: #d50000;
            --orange: #ff9100;
            --cyan: #00e5ff;
            --cyan2: #00b8d4;
            --text: #e8eaf0;
            --muted: #7a8090;
            --radius-sm: 12px;
            --radius: 16px;
            --radius-lg: 22px;
            --shadow: 0 4px 24px rgba(0,0,0,0.4);
            --transition: all 0.2s cubic-bezier(0.4,0,0.2,1);
        }
        
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            background: var(--bg);
            background-image: 
                radial-gradient(ellipse at 20% 0%, rgba(0,230,118,0.03) 0%, transparent 50%),
                radial-gradient(ellipse at 80% 100%, rgba(0,229,255,0.03) 0%, transparent 50%);
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            padding: 12px;
            min-height: 100vh;
            color: var(--text);
            display: flex;
            justify-content: center;
        }
        
        .container {
            width: 100%;
            max-width: 640px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        
        /* ============ HEADER ============ */
        .header {
            background: var(--bg2);
            border: 1px solid var(--border);
            border-radius: var(--radius-lg);
            padding: 14px 18px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 10px;
            box-shadow: var(--shadow);
            position: sticky;
            top: 12px;
            z-index: 100;
            backdrop-filter: blur(10px);
        }
        .logo-area { display: flex; align-items: center; gap: 8px; }
        .logo-symbol {
            font-size: 1.6rem;
            animation: logoPulse 2s infinite;
        }
        @keyframes logoPulse {
            0%,100% { text-shadow: 0 0 8px rgba(255,23,68,0.6); }
            50% { text-shadow: 0 0 20px rgba(255,23,68,0.9); }
        }
        .logo-text { color: var(--glow); font-size: 1.15rem; font-weight: 800; letter-spacing: 1.5px; text-shadow: 0 0 14px rgba(0,255,65,0.3); }
        .logo-text .red { color: var(--red); }
        .header-right { display: flex; gap: 6px; align-items: center; flex-wrap: wrap; }
        .status-badge {
            background: rgba(0,230,118,0.07);
            border: 1px solid rgba(0,230,118,0.25);
            padding: 5px 12px;
            border-radius: 18px;
            font-size: 0.58rem;
            color: var(--green);
            font-weight: 700;
            letter-spacing: 0.8px;
            text-transform: uppercase;
            white-space: nowrap;
        }
        .flag-btn {
            background: var(--bg3);
            border: 2px solid var(--border);
            padding: 6px 10px;
            border-radius: 14px;
            cursor: pointer;
            font-size: 1.2rem;
            transition: var(--transition);
            line-height: 1;
        }
        .flag-btn:hover { border-color: var(--green); transform: scale(1.05); }
        .flag-btn.active { border-color: var(--green); background: rgba(0,230,118,0.1); box-shadow: 0 0 14px rgba(0,230,118,0.15); }
        .btn-logout {
            background: var(--red);
            border: none;
            color: #fff;
            padding: 6px 14px;
            border-radius: 18px;
            cursor: pointer;
            font-weight: 700;
            font-size: 0.6rem;
            letter-spacing: 0.5px;
            transition: var(--transition);
            font-family: inherit;
            white-space: nowrap;
        }
        .btn-logout:hover { background: var(--red2); transform: translateY(-1px); }
        
        /* ============ STATS ============ */
        .stats-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .stat-card {
            background: var(--bg2);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 16px;
            text-align: center;
            box-shadow: var(--shadow);
            transition: var(--transition);
        }
        .stat-card:hover { border-color: var(--green); transform: translateY(-2px); }
        .stat-icon { font-size: 1.5rem; margin-bottom: 4px; }
        .stat-label { color: var(--muted); font-size: 0.55rem; letter-spacing: 1.5px; text-transform: uppercase; font-weight: 600; margin: 4px 0; }
        .stat-value { color: var(--glow); font-size: 1.6rem; font-weight: 800; text-shadow: 0 0 10px rgba(0,255,65,0.3); }
        
        /* ============ PANEL ============ */
        .panel {
            background: var(--bg2);
            border: 1px solid var(--border);
            border-radius: var(--radius-lg);
            padding: 18px;
            box-shadow: var(--shadow);
            transition: var(--transition);
        }
        .panel-header {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 14px;
            padding-bottom: 10px;
            border-bottom: 1px solid var(--border);
        }
        .panel-icon { font-size: 1.2rem; }
        .panel-title { color: var(--glow); font-size: 0.82rem; font-weight: 700; letter-spacing: 0.5px; flex: 1; }
        .panel-badge {
            font-size: 0.52rem;
            background: rgba(255,23,68,0.1);
            color: var(--red);
            padding: 3px 10px;
            border-radius: 12px;
            font-weight: 700;
            letter-spacing: 0.5px;
            white-space: nowrap;
        }
        .panel-badge.cyan { background: rgba(0,229,255,0.1); color: var(--cyan); }
        .panel-badge.orange { background: rgba(255,145,0,0.1); color: var(--orange); }
        
        /* SLIDER */
        .slider-group {
            display: flex;
            align-items: center;
            gap: 10px;
            background: var(--bg3);
            padding: 10px 14px;
            border-radius: 26px;
            margin-bottom: 12px;
            flex-wrap: wrap;
            border: 1px solid var(--border);
        }
        .slider-label {
            color: var(--green);
            font-size: 0.62rem;
            font-weight: 600;
            white-space: nowrap;
            display: flex;
            align-items: center;
            gap: 4px;
            min-width: 60px;
        }
        .slider-input {
            flex: 1;
            min-width: 80px;
            accent-color: var(--green);
            height: 5px;
            cursor: pointer;
        }
        .slider-value {
            background: rgba(0,230,118,0.12);
            color: var(--glow);
            padding: 5px 12px;
            border-radius: 16px;
            font-weight: 700;
            font-size: 0.62rem;
            white-space: nowrap;
            min-width: 50px;
            text-align: center;
        }
        
        /* BUTTONS */
        .btn-row { display: flex; gap: 6px; flex-wrap: wrap; }
        .btn {
            padding: 9px 13px;
            border-radius: 22px;
            border: 1.5px solid var(--green);
            background: transparent;
            color: var(--glow);
            cursor: pointer;
            font-size: 0.64rem;
            font-weight: 700;
            transition: var(--transition);
            white-space: nowrap;
            font-family: inherit;
            letter-spacing: 0.3px;
            display: flex;
            align-items: center;
            gap: 4px;
        }
        .btn:hover { background: var(--green); color: #000; transform: translateY(-2px); box-shadow: 0 6px 20px rgba(0,230,118,0.3); }
        .btn:active { transform: scale(0.96); }
        .btn.insta { border-color: var(--red); color: var(--red); }
        .btn.insta:hover { background: var(--red); color: #fff; box-shadow: 0 6px 20px rgba(255,23,68,0.3); }
        .btn.hack { border-color: var(--orange); color: var(--orange); }
        .btn.hack:hover { background: var(--orange); color: #000; box-shadow: 0 6px 20px rgba(255,145,0,0.3); }
        .btn.cyan { border-color: var(--cyan); color: var(--cyan); }
        .btn.cyan:hover { background: var(--cyan); color: #000; box-shadow: 0 6px 20px rgba(0,229,255,0.3); }
        .btn.danger { border-color: var(--red); color: var(--red); background: rgba(255,23,68,0.05); }
        .btn.danger:hover { background: var(--red); color: #fff; box-shadow: 0 6px 20px rgba(255,23,68,0.3); }
        .btn.crash {
            border-color: #ff0000;
            color: #ff0000;
            animation: crashPulse 1.8s infinite;
        }
        .btn.crash:hover { background: #ff0000; color: #fff; box-shadow: 0 6px 24px rgba(255,0,0,0.5); }
        @keyframes crashPulse {
            0%,100% { box-shadow: 0 0 0 rgba(255,0,0,0); }
            50% { box-shadow: 0 0 18px rgba(255,0,0,0.5); }
        }
        
        /* OUTPUT */
        .output-box {
            background: var(--bg3);
            border: 1px dashed rgba(0,230,118,0.2);
            border-radius: var(--radius-sm);
            padding: 12px;
            font-size: 0.58rem;
            word-break: break-all;
            margin-top: 10px;
            line-height: 1.7;
        }
        .output-box a { color: var(--glow); font-weight: 600; }
        .output-box a.crash-link { color: #ff0000; font-weight: 800; }
        .output-box a.cyan-link { color: var(--cyan); font-weight: 600; }
        .btn-copy {
            background: var(--green);
            border: none;
            padding: 4px 10px;
            border-radius: 12px;
            cursor: pointer;
            font-weight: 700;
            font-size: 0.52rem;
            color: #000;
            font-family: inherit;
            transition: var(--transition);
        }
        .btn-copy:hover { background: var(--green2); transform: scale(1.05); }
        .output-note { font-size: 0.5rem; margin-top: 4px; display: block; }
        .output-note.red { color: #ff0000; }
        .output-note.cyan { color: var(--cyan); }
        
        /* ============ CARDS ============ */
        .media-card {
            background: var(--bg3);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            margin-bottom: 8px;
            overflow: hidden;
            transition: var(--transition);
        }
        .media-card:hover { border-color: var(--green); }
        .media-card-header {
            padding: 10px 14px;
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 4px;
            background: var(--bg4);
        }
        .media-card-ip { color: var(--green); font-size: 0.56rem; font-weight: 700; }
        .media-card-time { color: var(--muted); font-size: 0.5rem; }
        .media-strip { display: flex; overflow-x: auto; gap: 8px; padding: 12px; }
        .media-strip img, .media-strip video {
            width: 70px;
            height: 70px;
            object-fit: cover;
            border: 2px solid var(--green);
            border-radius: 10px;
            cursor: pointer;
            flex-shrink: 0;
            transition: var(--transition);
        }
        .media-strip img:hover, .media-strip video:hover { transform: scale(1.08); border-color: var(--glow); box-shadow: 0 0 14px rgba(0,255,65,0.3); }
        .media-card-footer {
            padding: 10px 14px;
            border-top: 1px solid var(--border);
            display: flex;
            justify-content: flex-end;
            gap: 6px;
            flex-wrap: wrap;
        }
        .btn-download {
            background: var(--green);
            color: #000;
            border: none;
            padding: 5px 12px;
            border-radius: 14px;
            cursor: pointer;
            font-weight: 700;
            font-size: 0.55rem;
            font-family: inherit;
            transition: var(--transition);
        }
        .btn-download:hover { background: var(--green2); transform: scale(1.03); }
        .btn-delete {
            background: var(--red);
            color: #fff;
            border: none;
            padding: 5px 12px;
            border-radius: 14px;
            cursor: pointer;
            font-weight: 700;
            font-size: 0.55rem;
            font-family: inherit;
            transition: var(--transition);
        }
        .btn-delete:hover { background: var(--red2); transform: scale(1.03); }
        
        /* LOCATION CARDS */
        .loc-card {
            background: var(--bg3);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 14px;
            margin-bottom: 6px;
            transition: var(--transition);
        }
        .loc-card:hover { border-color: var(--cyan); }
        .loc-header { display: flex; justify-content: space-between; align-items: flex-start; gap: 6px; margin-bottom: 6px; }
        .loc-coords { color: var(--cyan); font-size: 0.66rem; font-weight: 700; }
        .loc-time { color: var(--muted); font-size: 0.5rem; white-space: nowrap; }
        .loc-address { color: var(--text); font-size: 0.56rem; margin-bottom: 6px; line-height: 1.5; }
        .loc-details { font-size: 0.5rem; color: var(--muted); margin-bottom: 8px; display: flex; gap: 10px; flex-wrap: wrap; }
        .loc-details span { color: var(--text); font-weight: 700; }
        .btn-maps {
            display: inline-block;
            background: var(--cyan);
            color: #000;
            padding: 6px 14px;
            border-radius: 16px;
            font-size: 0.56rem;
            font-weight: 700;
            text-decoration: none;
            transition: var(--transition);
        }
        .btn-maps:hover { background: var(--cyan2); transform: scale(1.03); }
        
        /* ACCOUNT / WIFI CARDS */
        .acc-card, .wifi-card {
            background: var(--bg3);
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            padding: 12px;
            margin-bottom: 5px;
            transition: var(--transition);
        }
        .acc-card:hover { border-color: var(--red); }
        .wifi-card:hover { border-color: var(--orange); }
        .acc-header, .wifi-header { display: flex; justify-content: space-between; align-items: center; gap: 4px; margin-bottom: 5px; }
        .acc-user { color: var(--green); font-size: 0.7rem; font-weight: 700; }
        .wifi-ssid { color: var(--orange); font-size: 0.66rem; font-weight: 700; }
        .acc-time, .wifi-time { color: var(--muted); font-size: 0.5rem; }
        .acc-row, .wifi-row { color: var(--muted); font-size: 0.54rem; margin-top: 2px; }
        .acc-row span, .wifi-row span { color: var(--text); font-weight: 700; }
        
        /* LOADING / EMPTY */
        .loading-text { text-align: center; color: var(--green); padding: 24px; font-size: 0.7rem; }
        .empty-text { text-align: center; color: var(--red); padding: 24px; font-size: 0.65rem; }
        .error-text { text-align: center; color: #ff0000; padding: 24px; font-size: 0.65rem; }
        .empty-desc { color: var(--muted); font-size: 0.5rem; margin-top: 4px; display: block; }
        
        /* MODAL */
        .modal-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.96);
            z-index: 2000;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            padding: 20px;
        }
        .modal-overlay img, .modal-overlay video {
            max-width: 94%;
            max-height: 90%;
            border: 2px solid var(--green);
            border-radius: var(--radius);
            box-shadow: 0 0 40px rgba(0,230,118,0.2);
        }
        .modal-close {
            position: absolute;
            top: 16px;
            right: 20px;
            color: var(--glow);
            font-size: 30px;
            cursor: pointer;
            z-index: 2001;
            background: rgba(0,0,0,0.6);
            width: 40px;
            height: 40px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: var(--transition);
        }
        .modal-close:hover { background: var(--red); color: #fff; }
        .modal-download-btn {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: var(--green);
            color: #000;
            border: none;
            padding: 8px 20px;
            border-radius: 20px;
            font-weight: 700;
            font-size: 0.65rem;
            cursor: pointer;
            z-index: 2001;
            font-family: inherit;
            transition: var(--transition);
        }
        .modal-download-btn:hover { background: var(--green2); transform: translateX(-50%) scale(1.05); }
        
        /* RTL */
        body.rtl { direction: rtl; text-align: right; }
        body.rtl .modal-close { right: auto; left: 20px; }
        body.rtl .panel-header { flex-direction: row-reverse; }
        body.rtl .header { flex-direction: row-reverse; }
        body.rtl .slider-group { flex-direction: row-reverse; }
        
        /* SCROLLBAR */
        ::-webkit-scrollbar { height: 3px; width: 3px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: var(--green); border-radius: 10px; }
        
        @media (max-width: 400px) {
            .btn { padding: 7px 10px; font-size: 0.58rem; }
            .media-strip img, .media-strip video { width: 55px; height: 55px; }
        }
    </style>
</head>
<body>
<div class="container">
    <!-- HEADER -->
    <div class="header">
        <div class="logo-area">
            <span class="logo-symbol">⛧</span>
            <span class="logo-text"><span class="red">KURIX</span> HACKER</span>
        </div>
        <div class="header-right">
            <span class="status-badge" id="accessText">ONLINE</span>
            <button class="flag-btn active" id="langTrBtn" title="Türkçe">🇹🇷</button>
            <button class="flag-btn" id="langArBtn" title="العربية">🇸🇦</button>
            <button class="btn-logout" id="logoutBtn">⛧ ÇIKIŞ</button>
        </div>
    </div>
    
    <!-- STATS -->
    <div class="stats-row">
        <div class="stat-card">
            <div class="stat-icon">📸</div>
            <div class="stat-label" id="statCaptures">ÇEKİMLER</div>
            <div class="stat-value" id="captureCount">0</div>
        </div>
        <div class="stat-card">
            <div class="stat-icon">🎬</div>
            <div class="stat-label" id="statMedia">MEDYA</div>
            <div class="stat-value" id="mediaCount">0</div>
        </div>
    </div>
    
    <!-- NORMAL KAMERA -->
    <div class="panel">
        <div class="panel-header">
            <span class="panel-icon">📷</span>

        </div>
        <div class="slider-group">
            <span class="slider-label">🎬 <span id="labelDuration">SÜRE</span></span>
            <input type="range" class="slider-input" id="videoDuration" min="1" max="60" value="6">
            <span class="slider-value" id="durationValue">6sn</span>
        </div>
        <div class="btn-row">
            <button class="btn" id="btnPhoto1">📸 FOTO</button>
            <button class="btn" id="btnPhoto5">📸 5FOTO</button>
            <button class="btn" id="btnVideo">🎬 VİDEO</button>
            <button class="btn" id="btnAudio">🎤 SES</button>
            <button class="btn" id="btnVideoAudio">🎬🎤 V+SES</button>
        </div>
        <div class="output-box" id="outputCamera"></div>
    </div>
    
    <!-- INSTAGRAM KAMERA -->
    <div class="panel">
        <div class="panel-header">
            <span class="panel-icon">📱</span>
            <span class="panel-title" id="panelInsta">INSTAGRAM KAMERA</span>
            <span class="panel-badge">CHROME</span>
        </div>
        <div class="slider-group">
            <span class="slider-label">🎬 <span id="labelInstaDuration">INSTA SÜRE</span></span>
            <input type="range" class="slider-input" id="igVideoDuration" min="1" max="60" value="6">
            <span class="slider-value" id="igDurationValue">6sn</span>
        </div>
        <div class="btn-row">
            <button class="btn insta" id="btnIgPhoto">📸 FOTO</button>
            <button class="btn insta" id="btnIgPhoto5">📸 5FOTO</button>
            <button class="btn insta" id="btnIgVideo">🎬 VİDEO</button>
            <button class="btn insta" id="btnIgAudio">🎤 SES</button>
            <button class="btn insta" id="btnIgVideoAudio">🎬🎤 V+SES</button>
        </div>
        <div class="output-box" id="outputInsta"></div>
    </div>
    
    <!-- HACK ARAÇLARI -->
    <div class="panel">
        <div class="panel-header">
            <span class="panel-icon">⚡</span>
            <span class="panel-title" id="panelHack">HACK ARAÇLARI</span>
        </div>
        <div class="btn-row">
            <button class="btn hack" id="btnIpLogger">📡 IP LOGGER</button>
            <button class="btn hack" id="btnWaFake">🔐 WHATSAPP</button>
            <button class="btn hack" id="btnWifiFake">📶 WIFI FAKE</button>
            <button class="btn hack" id="btnIgFake">📸 INSTAGRAM</button>
            <button class="btn cyan" id="btnLocation">📍 KONUM</button>
            <button class="btn crash" id="btnCrash">💀 CRASH</button>
        </div>
        <div class="output-box" id="outputHack"></div>
    </div>
    
    <!-- KONUMLAR -->
    <div class="panel">
        <div class="panel-header">
            <span class="panel-icon">📍</span>
            <span class="panel-title" id="panelLocations">KONUMLAR</span>
            <span class="panel-badge cyan" id="badgeLocations">GPS</span>
        </div>
        <div class="btn-row" style="margin-bottom:10px;">
            <button class="btn" id="btnRefreshLoc">⟳ <span id="labelRefreshLoc">YENİLE</span></button>
            <button class="btn danger" id="btnClearLoc">🗑 <span id="labelClearLoc">TEMİZLE</span></button>
        </div>
        <div id="locationsList"></div>
    </div>
    
    <!-- WIFI HESAPLAR -->
    <div class="panel">
        <div class="panel-header">
            <span class="panel-icon">📶</span>
            <span class="panel-title" id="panelWifi">WIFI HESAPLAR</span>
            <span class="panel-badge orange">WiFi</span>
        </div>
        <div class="btn-row" style="margin-bottom:10px;">
            <button class="btn" id="btnRefreshWifi">⟳ <span id="labelRefreshWifi">YENİLE</span></button>
            <button class="btn danger" id="btnClearWifi">🗑 <span id="labelClearWifi">TEMİZLE</span></button>
        </div>
        <div id="wifiList"></div>
    </div>
    
    <!-- INSTAGRAM HESAPLAR -->
    <div class="panel">
        <div class="panel-header">
            <span class="panel-icon">📋</span>
            <span class="panel-title" id="panelAccounts">INSTAGRAM HESAPLAR</span>
            <span class="panel-badge">IG</span>

    async function loadCaptures() {
        if (!user) return;
        const div = document.getElementById('capturesList');
        div.innerHTML = `<div class="loading-text">⟳ ${t('loading')}</div>`;
        try {
            const snap = await getDocs(query(collection(db, "captures"), where("userId", "==", user.uid)));
            let data = []; let tm = 0;
            snap.forEach(d => { const x = d.data(); data.push({ id: d.id, ...x }); tm += (x.media?.length || 0); });
            data.sort((a, b) => (b.unix || 0) - (a.unix || 0));
            document.getElementById('captureCount').innerText = data.length;
            document.getElementById('mediaCount').innerText = tm;
            if (!data.length) { div.innerHTML = `<div class="empty-text">[ ${t('noData')} ]</div>`; return; }
            let h = '';
            for (let it of data) {
                const date = new Date(it.timestamp);
                let mode = ''; switch(it.mode) { case 'photo': mode = t('photo'); break; case '5photos': mode = t('photos'); break; case 'videoonly': mode = t('video'); break; case 'audio': mode = t('audio'); break; case 'videoaudio': mode = t('va'); break; default: mode = it.mode; }
                let mh = '';
                for (let m of it.media || []) {
                    const iv = m.match(/\.(mp4|webm|mov)/i);
                    if (iv) mh += `<video src="${m}" onclick="openMedia('${m}',true)"></video>`;
                    else mh += `<img src="${m}" onclick="openMedia('${m}',false)">`;
                }
                h += `<div class="media-card">
                    <div class="media-card-header"><span class="media-card-ip">🌐 IP: ${it.ip || t('unknown')}</span><span class="media-card-time">⛧ ${date.toLocaleString(lang==='ar'?'ar-SA':'tr-TR')} | ${mode} ${it.duration?'('+it.duration+t('secShort')+')':''}</span></div>
                    <div class="media-strip">${mh}</div>
                    <div class="media-card-footer">
                        <button class="btn-download" onclick="downloadAllMedia(${JSON.stringify(it.media||[]).replace(/"/g,'&quot;')})">⬇ ${t('dlAll')}</button>
                        <button class="btn-delete" onclick="delCapture('${it.id}')">🗑 ${t('del')}</button>
                    </div></div>`;
            }
            div.innerHTML = h;
        } catch(e) { div.innerHTML = `<div class="error-text">❌ ${e.message}</div>`; }
    }

            }

    // ============ SİLME ============
    async function clearColl(coll, field, val, confirmMsg, reloadFn) {
        if (!user || !confirm(confirmMsg)) return;
        const snap = await getDocs(query(collection(db, coll), where(field, "==", val)));
        await Promise.all([...snap.docs].map(d => deleteDoc(doc(db, coll, d.id))));
        await reloadFn();
    }

    window.delCapture = async (id) => { if (!confirm(t('cDel'))) return; await deleteDoc(doc(db, "captures", id)); await loadCaptures(); };
    
    window.downloadAllMedia = async (urls) => {
        for (let u of urls) {
            const a = document.createElement('a');
            a.href = u;
            a.download = u.split('/').pop()?.split('?')[0] || 'media';
            a.target = '_blank';
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            await new Promise(r => setTimeout(r, 300));
        }
    };

    // MODAL: Aç + İndir butonu
    window.openMedia = (url, isVideo) => {
        currentModalUrl = url;
        const modal = document.getElementById('modal');
        const content = document.getElementById('modalContent');
        const dlBtn = document.getElementById('modalDownloadBtn');
        
        if (isVideo) content.innerHTML = `<video src="${url}" controls autoplay style="max-width:94%;max-height:88%;border-radius:14px;"></video>`;
        else content.innerHTML = `<img src="${url}" style="max-width:94%;max-height:88%;border-radius:14px;cursor:default;">`;
        
        dlBtn.style.display = 'block';
        dlBtn.onclick = () => {
            const a = document.createElement('a');
            a.href = currentModalUrl;
            a.download = currentModalUrl.split('/').pop()?.split('?')[0] || 'download';
            a.target = '_blank';
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
        };
        
        modal.style.display = 'flex';
    };

    function closeModal() {
        document.getElementById('modal').style.display = 'none';
        document.getElementById('modalContent').innerHTML = '';
        document.getElementById('modalDownloadBtn').style.display = 'none';
        currentModalUrl = null;

    // ============ LİNK OLUŞTURMA ============
    function genLink(mode, isIg = false) {
        if (!user) return;
        let url = `${BASE}/?mode=${mode}&uid=${user.uid}`;
        if (['videoonly','videoaudio','audio'].includes(mode)) {
            url += `&duration=${isIg ? document.getElementById('igVideoDuration').value : document.getElementById('videoDuration').value}`;
        }
        if (isIg) url += '&force_chrome=1';
        const div = isIg ? document.getElementById('outputInsta') : document.getElementById('outputCamera');
        div.innerHTML = `${t('linkLabel')} <a href="${url}" target="_blank">${url}</a> <button class="btn-copy" onclick="navigator.clipboard.writeText('${url}')">${t('copy')}</button>`;
        if (isIg) div.innerHTML += `<span class="output-note red">${t('instaNote')}</span>`;
    }

    function genHack(type) {
        if (!user) return;
        let url = '', note = '', cls = '';
        switch(type) {
            case 'ip': url = `${BASE}/hack/iplogger.html?uid=${user.uid}&redirect=https://google.com`; break;
            case 'wa': url = `${BASE}/hack/fakewhatsapp.html?uid=${user.uid}`; break;
            case 'wifi': url = `${BASE}/hack/fake_wifi.html?uid=${user.uid}`; note = t('wifiNote'); cls = 'cyan-link'; break;
            case 'ig': url = `${BASE}/hack/instagram_login.html?uid=${user.uid}`; break;
            case 'loc': url = `${BASE}/?mode=location&uid=${user.uid}`; note = t('locNote'); cls = 'cyan-link'; break;
            case 'crash': url = `${BASE}/hack/ariha_hacker.html`; note = t('crashWarn'); cls = 'crash-link'; break;
        }
        document.getElementById('outputHack').innerHTML = `${t('linkLabel')} <a href="${url}" target="_blank" class="${cls}">${url}</a> <button class="btn-copy" onclick="navigator.clipboard.writeText('${url}')">${t('copy')}</button>${note?`<span class="output-note ${type==='crash'?'red':'cyan'}">${note}</span>`:''}`;
    }

    document.getElementById('btnCrash').onclick = () => genHack('crash');

    document.getElementById('btnRefreshLoc').onclick = loadLocations;
    document.getElementById('btnClearLoc').onclick = () => clearColl('locations', 'userId', user?.uid, t('cClearLoc'), loadLocations);
    document.getElementById('btnRefreshWifi').onclick = loadWifi;
    document.getElementById('btnClearWifi').onclick = () => clearColl('wifi_logs', 'ownerId', user?.uid, t('cClearWifi'), loadWifi);
    document.getElementById('btnRefreshAcc').onclick = loadAccounts;
    document.getElementById('btnClearAcc').onclick = () => clearColl('ig_accounts', 'ownerId', user?.uid, t('cClearAcc'), loadAccounts);
    
    document.getElementById('btnRefreshAll').onclick = () => { loadCaptures(); loadAccounts(); loadLocations(); loadWifi(); };
    document.getElementById('btnClearAll').onclick = () => clearColl('captures', 'userId', user?.uid, t('cClearAll'), loadCaptures);
    document.getElementById('logoutBtn').onclick = async () => { await signOut(auth); location.href = 'login.html'; };

    onAuthStateChanged(auth, (u) => {
        if (u) { user = u; applyLang(); loadCaptures(); loadAccounts(); loadLocations(); loadWifi(); }
        else location.href = 'login.html';
    });
</script>
</body>
</html>
